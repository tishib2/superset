name: Auto Flatten Test describe Blocks

on:
  push:
    branches:
      - "master"
      - "[0-9].[0-9]*"

permissions:
  contents: read

jobs:
  flatten-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Detect describe blocks in changed test files
        id: detect
        run: |
          CONFIG_FILE=".devin/flatten-tests.json"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "No flatten-tests.json found, skipping."
            echo "matched_files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 変更ファイルを取得
          CHANGED_FILES="$(git diff --name-only HEAD~1 HEAD)"

          # targets を読み込む
          TARGETS="$(jq -r '.targets[]' "$CONFIG_FILE")"

          MATCHED_FILES=()
          while IFS= read -r changed; do
            # テストファイル以外はスキップ
            if [[ ! "$changed" =~ \.(test|spec)\.(ts|tsx)$ ]]; then
              continue
            fi
            while IFS= read -r target; do
              if [[ "$changed" == *"$target"* ]]; then
                if grep -q 'describe(' "$changed" 2>/dev/null; then
                  MATCHED_FILES+=("$changed")
                  break
                fi
              fi
            done <<< "$TARGETS"
          done <<< "$CHANGED_FILES"

          if [ ${#MATCHED_FILES[@]} -eq 0 ]; then
            echo "No describe blocks found in changed files, skipping."
            echo "matched_files=" >> "$GITHUB_OUTPUT"
          else
            FILES_STR="$(IFS=$'\n'; echo "${MATCHED_FILES[*]}")"
            echo "Detected files with describe blocks:"
            echo "$FILES_STR"
            # 改行を | で区切って出力（GITHUB_OUTPUT の制約対応）
            echo "matched_files=$(IFS='|'; echo "${MATCHED_FILES[*]}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Launch Devin session to flatten describe blocks
        if: steps.detect.outputs.matched_files != ''
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
        run: |
          CONFIG_FILE=".devin/flatten-tests.json"
          FILES_RAW="${{ steps.detect.outputs.matched_files }}"
          FILES_LIST="$(echo "$FILES_RAW" | tr '|' '\n')"
          TEST_COMMAND="$(jq -r '.test_command' "$CONFIG_FILE")"
          PR_BRANCH_PREFIX="$(jq -r '.pr_branch_prefix' "$CONFIG_FILE")"
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"

          PROMPT="以下のテストファイルで describe() ブロックを Jest の推奨スタイルに従いフラット化してください。

          対象ファイル:
          $FILES_LIST

          ルール:
          - describe('A', () => { test('B', ...) }) → test('A > B', ...) に変換する
          - ネストが深い場合は > で連結する（例: test('A > B > C', ...)）
          - テストのロジック・アサーションは一切変更しない
          - eslint-disable-next-line no-restricted-globals のコメント行を削除する
          - 変換後に以下のコマンドで全テストがパスすることを確認する:
            $TEST_COMMAND=<対象ファイル名>
          - 全テストがパスしたら ${PR_BRANCH_PREFIX}/${TIMESTAMP} ブランチで PR を作成する"

          # 最大3回リトライ
          SESSION_ID=""
          for attempt in 1 2 3; do
            echo "Launching Devin session... (attempt $attempt/3)"
            RESPONSE="$(curl -sf \
              -X POST \
              -H "Authorization: Bearer $DEVIN_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg prompt "$PROMPT" '{"prompt": $prompt}')" \
              "https://api.devin.ai/v3/organizations/$DEVIN_ORG_ID/sessions" || echo "")"

            SESSION_ID="$(echo "$RESPONSE" | jq -r '.session_id // empty' 2>/dev/null || echo "")"
            if [ -n "$SESSION_ID" ]; then
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "API call failed, retrying in 5 seconds..."
              sleep 5
            fi
          done

          if [ -z "$SESSION_ID" ]; then
            echo "::error::Failed to launch Devin session after 3 attempts."
            exit 1
          fi

          echo "Devin session launched successfully."
          echo "Session URL: https://app.devin.ai/sessions/$SESSION_ID"

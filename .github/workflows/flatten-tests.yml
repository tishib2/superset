name: Auto Flatten Test describe Blocks

on:
  push:
    branches:
      - "master"
      - "[0-9].[0-9]*"

permissions:
  contents: read

jobs:
  detect-and-notify:
    runs-on: ubuntu-latest
    outputs:
      matched_files: ${{ steps.detect.outputs.matched_files }}
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Detect describe blocks in changed test files
        id: detect
        run: |
          CONFIG_FILE=".devin/flatten-tests.json"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "No flatten-tests.json found, skipping."
            echo "matched_files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only HEAD~1 HEAD)"
          TARGETS="$(jq -r '.targets[]' "$CONFIG_FILE")"
          MATCHED_FILES=()

          while IFS= read -r changed; do
            [[ ! "$changed" =~ \.(test|spec)\.(ts|tsx)$ ]] && continue
            while IFS= read -r target; do
              if [[ "$changed" == *"$target"* ]]; then
                if grep -q 'describe(' "$changed" 2>/dev/null; then
                  MATCHED_FILES+=("$changed")
                  break
                fi
              fi
            done <<< "$TARGETS"
          done <<< "$CHANGED_FILES"

          if [ ${#MATCHED_FILES[@]} -eq 0 ]; then
            echo "No describe blocks found in changed files, skipping."
            echo "matched_files=" >> "$GITHUB_OUTPUT"
          else
            echo "Detected files with describe blocks:"
            printf '%s\n' "${MATCHED_FILES[@]}"
            echo "matched_files=$(IFS='|'; echo "${MATCHED_FILES[*]}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack on detection
        if: steps.detect.outputs.matched_files != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          FILES_DISPLAY="$(echo "${{ steps.detect.outputs.matched_files }}" | tr '|' '\n' | sed 's/^/• /')"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD="$(jq -n \
            --arg pusher "${{ github.actor }}" \
            --arg files "$FILES_DISPLAY" \
            --arg commit_url "$COMMIT_URL" \
            --arg run_url "$RUN_URL" \
            --arg run_id "${{ github.run_id }}" \
            '{
              "text": ":mag: describe ブロック検出 → Devin によるフラット化を開始します",
              "attachments": [
                {
                  "color": "#0088cc",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": ":mag: *describe ブロック検出 → Devin によるフラット化を開始します*\n\n*Run ID:* <\($run_url)|\($run_id)>\n*Push したユーザー:* \($pusher)\n*対象ファイル:*\n\($files)\n\n<\($commit_url)|コミットを見る>"
                      }
                    }
                  ]
                }
              ]
            }')"
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"

  launch-devin:
    runs-on: ubuntu-latest
    needs: detect-and-notify
    if: needs.detect-and-notify.outputs.matched_files != ''
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Launch Devin session and notify on completion
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGET_FILES: ${{ needs.detect-and-notify.outputs.matched_files }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          REPO_ROOT: ${{ github.workspace }}
          SKIP_LAUNCH_NOTIFICATION: "1"
        run: cd docker/flatten-tests && uv run python -m flatten_tests.main
